logging:
  config: classpath:log4j2.yml

spring:
  config:
    import: optional:classpath:application-secret.yml   # 민감 정보 파일 로드 (없으면 무시)
  devtools:
    livereload:
      enabled: true
    remote:
      restart:
        enabled: true
  security:
    user:
      name: ${SECURITY_USER_NAME:user}
      password: ${SECURITY_USER_PASSWORD:1111}

  datasource:
    # JPA
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL:jdbc:mariadb://localhost:3306/moviestorage}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
#      ddl-auto: update      # 엔티티 객체를 만들면 알아서 엔티티에 해당하는 테이블 생성
      ddl-auto: update      # 엔티티 객체를 만들면 알아서 엔티티에 해당하는 테이블 생성
        #      naming:
      # 엔티티 클래스의 카멜케이스 필드명을 데이터베이스 스네이크 케이스 컬럼에 자동 매핑
      # springboot 3.2.1 이후 오류. 필요시 java HibernateJpaVendorAdapter bean 만들어 사용.
    #        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true    # Hibernate 실행 시, SQL 쿼리를 개행, 들여쓰기를 사용해서 보기 쉽게 변환
    show-sql: true          # JPA 실행 시, 해당 쿼리를 콘솔에 출력
#    generate-ddl: true      # 테이블 자동 생성. vo 수정 시 마다 테이블 새로 생성
#    database: mysql


server:
  port: 8080